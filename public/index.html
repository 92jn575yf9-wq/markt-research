<!DOCTYPE html>
<html lang="de" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000" id="theme-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Markt-Research</title>
<style>
  :root {
    --bg: #000000; --bg-card: #1c1c1e; --bg-card-2: #2c2c2e; --bg-button-2: #2c2c2e;
    --separator: rgba(84,84,88,0.6); --shadow-sm: none;
    --text: #ffffff; --text-secondary: rgba(235,235,245,0.6); --text-tertiary: rgba(235,235,245,0.3);
    --tab-inactive: rgba(235,235,245,0.5);
    --accent: #b8e600; --accent-soft: rgba(184,230,0,0.18);
    --green: #30d158; --green-soft: rgba(48,209,88,0.2);
    --red: #ff453a; --red-soft: rgba(255,69,58,0.18);
    --orange: #ff9f0a; --orange-soft: rgba(255,159,10,0.18);
    --blue: #0a84ff; --blue-soft: rgba(10,132,255,0.18);
    --tab-bg: rgba(22,22,23,0.82);
  }
  html.light {
    --bg: #f2f2f7; --bg-card: #ffffff; --bg-card-2: #efeff4; --bg-button-2: #e5e5ea;
    --separator: rgba(60,60,67,0.29); --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
    --text: #000000; --text-secondary: rgba(60,60,67,0.6); --text-tertiary: rgba(60,60,67,0.3);
    --tab-inactive: rgba(60,60,67,0.55);
    --accent: #4a7400; --accent-soft: rgba(74,116,0,0.14);
    --green: #248a3d; --green-soft: rgba(36,138,61,0.13);
    --red: #d70015; --red-soft: rgba(215,0,21,0.1);
    --orange: #c93400; --orange-soft: rgba(201,52,0,0.1);
    --blue: #0040dd; --blue-soft: rgba(0,64,221,0.1);
    --tab-bg: rgba(248,248,250,0.82);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html.dark { color-scheme: dark; } html.light { color-scheme: light; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: calc(60px + env(safe-area-inset-bottom)); max-width: 760px; margin: 0 auto; }

  .view { display: none; padding-bottom: 24px; }
  .view.active { display: block; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px 0; min-height: 44px; }
  .nav-btn { background: none; border: none; color: var(--accent); font-size: 17px; cursor: pointer; padding: 6px 0; display: flex; align-items: center; font-weight: 400; font-family: inherit; }
  .nav-btn.icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); justify-content: center; font-size: 16px; box-shadow: var(--shadow-sm); border: 0.5px solid var(--separator); }
  .nav-btn.icon:active { opacity: 0.6; }

  .large-title { font-size: 34px; font-weight: 700; letter-spacing: 0.37px; padding: 8px 16px 4px; line-height: 1.1; }
  .subtitle { font-size: 15px; color: var(--text-secondary); padding: 0 16px 16px; }
  .group-header { font-size: 13px; font-weight: 400; color: var(--text-secondary); text-transform: uppercase; letter-spacing: -0.08px; padding: 18px 32px 6px; }

  .list-group { background: var(--bg-card); border-radius: 12px; margin: 0 16px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .list-item { padding: 14px 16px; cursor: pointer; position: relative; transition: background 0.12s; }
  .list-item:active { background: var(--bg-card-2); }
  .list-item + .list-item::before,
  .news-item + .news-item::before,
  .source-link + .source-link::before { content: ''; position: absolute; top: 0; left: 16px; right: 0; height: 0.5px; background: var(--separator); }

  .asset-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .asset-info { min-width: 0; flex: 1; }
  .asset-symbol { font-size: 17px; font-weight: 600; letter-spacing: -0.41px; }
  .asset-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-price { font-size: 17px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
  .asset-change { font-size: 13px; margin-top: 2px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  .asset-change.pos { color: var(--green); } .asset-change.neg { color: var(--red); } .asset-change.neu { color: var(--text-secondary); }

  .verdict-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--separator); }
  .verdict-pill { font-size: 11px; font-weight: 700; letter-spacing: 0.4px; padding: 4px 9px; border-radius: 6px; text-transform: uppercase; }
  .verdict-pill.akku { background: var(--accent-soft); color: var(--accent); }
  .verdict-pill.halten { background: var(--orange-soft); color: var(--orange); }
  .verdict-pill.beobachten { background: var(--blue-soft); color: var(--blue); }
  .verdict-pill.risiko { background: var(--red-soft); color: var(--red); }
  .verdict-pill.neu { background: var(--bg-card-2); color: var(--text-secondary); }

  .dca-mini { display: flex; gap: 3px; align-items: center; }
  .dca-mini .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--separator); }
  .dca-mini .dot.on { background: var(--accent); }
  .verdict-time { margin-left: auto; font-size: 12px; color: var(--text-tertiary); }

  .skeleton { border-radius: 4px; background: var(--bg-card-2); animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
  .empty-state .ico { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 15px; line-height: 1.4; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--bg-card); border-radius: 14px 14px 0 0; width: 100%; max-width: 760px; padding: 20px 16px calc(24px + env(safe-area-inset-bottom)); }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .modal-input { width: 100%; padding: 12px 14px; background: var(--bg-card-2); border: none; border-radius: 10px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; }
  .modal-input:focus { outline: 2px solid var(--accent); }
  .modal-select { width: 100%; padding: 12px 14px; background: var(--bg-card-2); border: none; border-radius: 10px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; appearance: none; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  .btn { flex: 1; padding: 12px 14px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #000; }
  html.light .btn-primary { color: #fff; }
  .btn-secondary { background: var(--bg-button-2); color: var(--text); }
  .btn:active { opacity: 0.7; }

  /* Tab Bar */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bg); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid var(--separator); padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
  .tab-bar-inner { display: flex; max-width: 760px; margin: 0 auto; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0 4px; background: none; border: none; color: var(--tab-inactive); cursor: pointer; transition: color 0.15s; min-height: 49px; font-family: inherit; position: relative; }
  .tab.active { color: var(--accent); }
  .tab svg { width: 24px; height: 24px; fill: currentColor; }
  .tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.06px; }
  .tab-badge { position: absolute; top: 6px; right: calc(50% - 18px); background: var(--red); color: #fff; font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* News */
  .news-item { padding: 14px 16px; cursor: pointer; position: relative; }
  .news-item:active { background: var(--bg-card-2); }
  .news-headline { font-size: 15px; font-weight: 600; line-height: 1.32; letter-spacing: -0.24px; }
  .news-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 12px; color: var(--text-secondary); }
  .news-source { font-weight: 500; }
  .news-relates { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .related-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--bg-button-2); padding: 4px 9px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .verdict-mini { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .verdict-mini.akku { background: var(--accent); }
  .verdict-mini.halten { background: var(--orange); }
  .verdict-mini.beobachten { background: var(--blue); }
  .verdict-mini.risiko { background: var(--red); }
  .verdict-mini.neu { background: var(--text-tertiary); }
  .news-link-arrow { margin-left: auto; color: var(--text-tertiary); font-size: 15px; flex-shrink: 0; }

  /* News loading */
  .news-loading { text-align: center; padding: 32px 16px; color: var(--text-secondary); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--separator); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Detail */
  .detail-hero { padding: 4px 16px 16px; }
  .detail-badges { display: flex; gap: 6px; margin-bottom: 8px; }
  .badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; letter-spacing: 0.4px; text-transform: uppercase; }
  .badge.aktie { background: var(--accent-soft); color: var(--accent); }
  .badge.etf { background: var(--blue-soft); color: var(--blue); }
  .badge.krypto { background: var(--orange-soft); color: var(--orange); }
  .badge.isin { background: var(--bg-card-2); color: var(--text-secondary); font-family: ui-monospace,"SF Mono",Menlo,monospace; font-weight: 500; border: 0.5px solid var(--separator); text-transform: none; }
  .detail-name { font-size: 17px; color: var(--text-secondary); margin-bottom: 10px; }
  .detail-price-line { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .detail-price { font-size: 36px; font-weight: 700; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .detail-change { font-size: 17px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .detail-change.pos { color: var(--green); } .detail-change.neg { color: var(--red); }

  .verdict-hero { background: var(--bg-card); border-radius: 14px; margin: 0 16px 8px; padding: 16px; box-shadow: var(--shadow-sm); }
  .verdict-hero-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .verdict-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .verdict-hero-value { font-size: 22px; font-weight: 700; }
  .verdict-hero-value.akku { color: var(--accent); } .verdict-hero-value.halten { color: var(--orange); }
  .verdict-hero-value.beobachten { color: var(--blue); } .verdict-hero-value.risiko { color: var(--red); }
  .verdict-hero-meta { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-secondary); }
  .dca-bar { display: flex; align-items: center; gap: 8px; }
  .dca-bar .dots { display: flex; gap: 4px; }
  .dca-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--separator); }
  .dca-bar .dot.on { background: var(--accent); }

  .reason-block { padding: 14px 16px; }
  .reason-block + .reason-block { border-top: 0.5px solid var(--separator); }
  .reason-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .reason-title .ico { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .reason-title.pro .ico { background: var(--green-soft); color: var(--green); }
  .reason-title.con .ico { background: var(--orange-soft); color: var(--orange); }
  .reason-title.flag .ico { background: var(--red-soft); color: var(--red); }
  .reason-list { list-style: none; }
  .reason-list li { font-size: 14px; line-height: 1.4; padding: 6px 0 6px 18px; position: relative; }
  .reason-list li::before { content: ''; position: absolute; left: 4px; top: 13px; width: 4px; height: 4px; border-radius: 50%; background: var(--text-tertiary); }
  .reason-source { font-size: 11px; color: var(--accent); margin-left: 4px; font-weight: 500; }

  .source-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; position: relative; }
  .source-link:active { background: var(--bg-card-2); }
  .source-info { flex: 1; min-width: 0; }
  .source-headline { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .source-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .source-arrow { color: var(--text-tertiary); font-size: 17px; }

  .detail-actions { padding: 16px; display: flex; gap: 8px; }

  .search-results {
    background: var(--bg-card-2);
    border-radius: 10px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 11px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .search-result-item:active { opacity: 0.7; }
  .search-result-item + .search-result-item::before {
    content: ''; position: absolute; top: 0; left: 14px; right: 0;
    height: 0.5px; background: var(--separator);
  }
  .sri-symbol {
    font-size: 14px; font-weight: 700;
    min-width: 52px; color: var(--accent);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .sri-info { flex: 1; min-width: 0; }
  .sri-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sri-type { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .search-spinner { text-align: center; padding: 12px; color: var(--text-secondary); font-size: 13px; }

  /* Chart */
  .chart-card { background: var(--bg-card); border-radius: 14px; margin: 0 16px 16px; padding: 14px; box-shadow: var(--shadow-sm); }
  .chart-tabs { display: flex; gap: 4px; background: var(--bg-button-2); padding: 3px; border-radius: 8px; margin-bottom: 12px; }
  .chart-tab { flex: 1; text-align: center; padding: 6px 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary); border-radius: 6px; cursor: pointer; }
  .chart-tab.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow-sm); }
  .chart-wrap { width: 100%; height: 120px; position: relative; }
  .chart-wrap svg { width: 100%; height: 100%; display: block; }
  .chart-placeholder { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 13px; }

  /* Suggestions */
  .suggestion-card {
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
  }
  .suggestion-card + .suggestion-card::before {
    content: ''; position: absolute; top: 0; left: 16px; right: 0;
    height: 0.5px; background: var(--separator);
  }
  .suggestion-card:active { background: var(--bg-card-2); }
  .sug-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sug-symbol { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
  .sug-name { font-size: 13px; color: var(--text-secondary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sug-grund { font-size: 14px; line-height: 1.4; margin-bottom: 8px; }
  .sug-news { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.35; }
  .sug-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sug-risiko { font-size: 11px; color: var(--orange); background: var(--orange-soft); padding: 3px 8px; border-radius: 5px; }
  .sug-add-btn {
    margin-left: auto;
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    font-size: 12px; font-weight: 700;
    padding: 6px 12px; cursor: pointer;
    font-family: inherit;
  }
  html.light .sug-add-btn { color: #fff; }
  .sug-add-btn:active { opacity: 0.7; }
  .sug-loading { text-align: center; padding: 24px 16px; color: var(--text-secondary); font-size: 14px; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--red); color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* Cluster Cards */
  .cluster-card { background: var(--bg-card); border-radius: 14px; margin: 0 16px 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .cluster-header { padding: 14px 16px 12px; border-bottom: 0.5px solid var(--separator); }
  .cluster-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cluster-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .cluster-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
  .cluster-count { font-size: 11px; font-weight: 600; color: var(--text-tertiary); background: var(--bg-card-2); padding: 2px 7px; border-radius: 10px; }
  .cluster-summary { font-size: 14px; line-height: 1.5; color: var(--text-secondary); }
  .cluster-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; position: relative; }
  .cluster-item:active { background: var(--bg-card-2); }
  .cluster-item + .cluster-item { border-top: 0.5px solid var(--separator); }
  .cluster-item-body { flex: 1; min-width: 0; }
  .cluster-item-headline { font-size: 13px; font-weight: 500; line-height: 1.35; color: var(--text); }
  .cluster-item-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .cluster-item-arrow { color: var(--text-tertiary); font-size: 16px; flex-shrink: 0; }

</style>
</head>
<body>

<!-- WATCHLIST -->
<div class="view active" data-view="watchlist">
  <div class="nav-bar">
    <button class="nav-btn icon" id="theme-toggle">◐</button>
    <button class="nav-btn icon" id="add-btn">+</button>
  </div>
  <h1 class="large-title">Watchlist</h1>
  <div class="subtitle" id="wl-subtitle">Wird geladen…</div>
  <div id="wl-content"></div>
</div>

<!-- NEWS -->
<div class="view" data-view="news">
  <div class="nav-bar">
    <span></span>
    <button class="nav-btn icon" id="news-refresh" title="Aktualisieren">↻</button>
  </div>
  <h1 class="large-title">News</h1>
  <div class="subtitle" id="news-subtitle">Für deine Watchlist</div>
  <div id="news-content"></div>

  <div id="suggestions-section">
    <div class="group-header" style="display:flex;justify-content:space-between;align-items:center;">
      <span>💡 KI-Vorschläge aus den News</span>
      <span id="sug-refresh-btn" style="font-size:11px;color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0;padding-right:16px;">Aktualisieren</span>
    </div>
    <div id="suggestions-content">
      <div class="list-group"><div class="sug-loading"><div class="spinner"></div><br>Analyse läuft…</div></div>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="view" data-view="detail">
  <div class="nav-bar">
    <button class="nav-btn nav-back" data-back><span style="font-size:22px;font-weight:600;margin-right:2px;">‹</span> Watchlist</button>
    <button class="nav-btn icon">⋯</button>
  </div>
  <div id="detail-content"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab active" data-tab="watchlist">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      <span class="tab-label">Watchlist</span>
    </button>
    <button class="tab" data-tab="news">
      <svg viewBox="0 0 24 24"><path d="M20 3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H4V5h16v14zM6 7h8v2H6zm0 4h8v2H6zm0 4h5v2H6zm9-2h4v4h-4z"/></svg>
      <span class="tab-label">News</span>
    </button>
  </div>
</nav>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-title">Asset hinzufügen</div>
    <div class="modal-field">
      <div class="modal-label">Firmenname oder Symbol suchen</div>
      <input class="modal-input" id="input-search" type="text" placeholder="z.B. Apple, MSCI World, Bitcoin…" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="modal-field" id="selected-asset-block" style="display:none;">
      <div style="background:var(--accent-soft);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;">
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:700;" id="selected-symbol-display"></div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;" id="selected-name-display"></div>
        </div>
        <button onclick="clearSelection()" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;padding:4px;">✕</button>
      </div>
    </div>
    <input type="hidden" id="input-symbol">
    <input type="hidden" id="input-type" value="stock">
    <div class="modal-field">
      <div class="modal-label">Notiz (optional)</div>
      <input class="modal-input" id="input-note" type="text" placeholder="z.B. Kerninvestment Sparplan">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Abbrechen</button>
      <button class="btn btn-primary" id="modal-add">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Theme ────────────────────────────────────────
const html = document.documentElement;
const themeMeta = document.getElementById('theme-meta');
function applyTheme(t) {
  html.classList.remove('dark','light'); html.classList.add(t);
  themeMeta.setAttribute('content', t === 'dark' ? '#000000' : '#f2f2f7');
  try { localStorage.setItem('mr-theme', t); } catch(e) {}
}
let savedTheme = null;
try { savedTheme = localStorage.getItem('mr-theme'); } catch(e) {}
applyTheme(savedTheme || (window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark'));
document.getElementById('theme-toggle').addEventListener('click', () => {
  applyTheme(html.classList.contains('dark') ? 'light' : 'dark');
});

// ── Navigation ───────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`.view[data-view="${name}"]`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.tab[data-tab="${name}"]`);
  if (tab) tab.classList.add('active');
  else document.querySelector('.tab[data-tab="watchlist"]').classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'news') { loadNews(); loadSuggestions(); }
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => showView(t.dataset.tab)));
document.querySelectorAll('[data-back]').forEach(b => b.addEventListener('click', () => showView('watchlist')));
document.getElementById('news-refresh').addEventListener('click', () => { newsCache = null; loadNews(true); });

// ── Toast ────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── API ──────────────────────────────────────────
const API = '/.netlify/functions';
async function fetchQuote(symbol, type) {
  const res = await fetch(`${API}/fetch-quote?symbol=${symbol}&type=${type}`);
  if (!res.ok) throw new Error(`Kurs nicht gefunden für ${symbol}`);
  return res.json();
}
async function loadWatchlist() {
  const res = await fetch(`${API}/watchlist`);
  return res.ok ? res.json() : [];
}
async function saveWatchlist(list) {
  await fetch(`${API}/watchlist`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(list) });
}
async function fetchNews(symbols, types, forceRefresh = false) {
  const s = symbols.join(',');
  const t = types.join(',');
  const refresh = forceRefresh ? '&refresh=1' : '';
  const res = await fetch(`${API}/fetch-news?symbols=${s}&types=${t}${refresh}`);
  return res.ok ? res.json() : [];
}

// ── State ────────────────────────────────────────
let watchlist = [];
let newsCache = null;

// ── Formatierung ─────────────────────────────────
function fmtPrice(p, currency) {
  if (!p && p !== 0) return '—';
  return new Intl.NumberFormat('de-DE', { style:'currency', currency: currency||'EUR', minimumFractionDigits:2, maximumFractionDigits: p > 1000 ? 0 : 2 }).format(p);
}
function fmtPct(p) {
  if (p === undefined || p === null) return '—';
  return `${p >= 0 ? '+' : ''}${p.toFixed(2)} %`;
}
function fmtAge(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (h < 1) return 'Gerade eben';
  if (h < 24) return `vor ${h} Std.`;
  if (d === 1) return 'Gestern';
  return `vor ${d} Tagen`;
}
function fmtNewsDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Heute';
  if (d.toDateString() === yesterday.toDateString()) return 'Gestern';
  return d.toLocaleDateString('de-DE', { day:'numeric', month:'long' });
}

// ── Watchlist rendern ─────────────────────────────
function renderWatchlist() {
  const container = document.getElementById('wl-content');
  const subtitle = document.getElementById('wl-subtitle');
  if (watchlist.length === 0) {
    subtitle.textContent = 'Noch keine Assets';
    container.innerHTML = `<div class="empty-state"><div class="ico">📈</div><h3>Watchlist ist leer</h3><p>Tippe auf + oben rechts, um dein erstes Asset hinzuzufügen.</p></div>`;
    return;
  }
  const groups = {
    akku: { label: 'Empfehlungen für deinen Sparplan', items: [] },
    beobachten: { label: 'Beobachten', items: [] },
    risiko: { label: 'Risiko', items: [] },
    neu: { label: 'Noch nicht analysiert', items: [] },
  };
  watchlist.forEach(a => {
    const v = a.verdict || 'neu';
    if (v === 'halten') groups.beobachten.items.push(a);
    else if (groups[v]) groups[v].items.push(a);
    else groups.neu.items.push(a);
  });
  subtitle.textContent = `${watchlist.length} Asset${watchlist.length !== 1 ? 's' : ''}`;
  let out = '';
  for (const [, g] of Object.entries(groups)) {
    if (!g.items.length) continue;
    out += `<div class="group-header">${g.label}</div><div class="list-group">`;
    g.items.forEach(a => { out += renderCard(a); });
    out += '</div>';
  }
  container.innerHTML = out;
  container.querySelectorAll('[data-symbol]').forEach(el => {
    el.addEventListener('click', () => {
      const a = watchlist.find(x => x.symbol === el.dataset.symbol);
      if (a) { renderDetail(a); showView('detail'); }
    });
  });
}

function renderCard(a) {
  const cc = (a.changePercent||0) > 0 ? 'pos' : (a.changePercent||0) < 0 ? 'neg' : 'neu';
  const v = a.verdict || 'neu';
  const vl = { akku:'Akkumulieren', halten:'Halten', beobachten:'Beobachten', risiko:'Risiko', neu:'Ausstehend' }[v];
  const dots = Array.from({length:5},(_,i) => `<span class="dot${i<(a.dcaScore||0)?' on':''}"></span>`).join('');
  return `
  <div class="list-item" data-symbol="${a.symbol}">
    <div class="asset-row">
      <div class="asset-info">
        <div class="asset-symbol">${a.symbol}</div>
        <div class="asset-name">${a.name||a.symbol}</div>
      </div>
      <div>
        <div class="asset-price">${a.price ? fmtPrice(a.price, a.currency) : '<span class="skeleton" style="display:inline-block;width:70px;height:17px;"></span>'}</div>
        <div class="asset-change ${cc}">${a.changePercent !== undefined ? fmtPct(a.changePercent) : ''}</div>
      </div>
    </div>
    <div class="verdict-row">
      <span class="verdict-pill ${v}">${vl}</span>
      <span class="dca-mini">${dots}</span>
      <span class="verdict-time">${a.analysisAge || 'Neu'}</span>
    </div>
  </div>`;
}


// ── News rendern ──────────────────────────────────
async function fetchGeneralNews(forceRefresh = false) {
  const refresh = forceRefresh ? '&refresh=1' : '';
  const res = await fetch(API + '/fetch-news?symbols=MARKET&types=general' + refresh);
  return res.ok ? res.json() : [];
}

async function loadNews(forceRefresh = false) {
  const container = document.getElementById('news-content');
  const subtitle = document.getElementById('news-subtitle');
  if (newsCache && !forceRefresh) { renderNewsClusters(newsCache); return; }
  container.innerHTML = '<div class="news-loading"><div class="spinner"></div><br>News werden geladen\u2026</div>';
  subtitle.textContent = 'Wird aktualisiert\u2026';
  try {
    const news = await fetchGeneralNews(forceRefresh);
    newsCache = news;
    renderNewsClusters(news);
    subtitle.textContent = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) + ' Uhr';
  } catch(err) {
    container.innerHTML = '<div class="empty-state"><div class="ico">\u26a0\ufe0f</div><h3>Fehler</h3><p>' + err.message + '</p></div>';
  }
}

async function renderNewsClusters(news) {
  const container = document.getElementById('news-content');
  if (!news || !news.length) {
    container.innerHTML = '<div class="empty-state"><div class="ico">\ud83d\udcad</div><h3>Keine News</h3><p>Momentan keine Markt-News.</p></div>';
    return;
  }
  container.innerHTML = '<div class="news-loading"><div class="spinner"></div><br>Claude clustert die News\u2026</div>';
  try {
    const res = await fetch(API + '/cluster-news', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ news: news, forceRefresh: false })
    });
    if (!res.ok) throw new Error('Cluster-Fehler');
    const clusters = await res.json();
    if (!Array.isArray(clusters) || !clusters.length) throw new Error('Keine Cluster');
    let html = '';
    clusters.forEach(function(c) {
      const itemsHtml = (c.items || []).slice(0, 5).map(function(item) {
        var hl = (item.headline || '').replace(/ - Reuters$| - CNBC$| - Bloomberg$| - AP$/,'').trim();
        var src = item.source || '';
        var t = item.datetime ? new Date(item.datetime).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr' : '';
        return '<div class="cluster-item" data-url="' + (item.url||'') + '">' +
          '<div class="cluster-item-body">' +
            '<div class="cluster-item-headline">' + escHtml(hl) + '</div>' +
            '<div class="cluster-item-meta">' + escHtml(src) + (t ? ' · ' + t : '') + '</div>' +
          '</div>' +
          '<div class="cluster-item-arrow">›</div>' +
        '</div>';
      }).join('');
      html +=
        '<div class="cluster-card">' +
          '<div class="cluster-header">' +
            '<div class="cluster-title-row">' +
              '<span class="cluster-emoji">' + (c.emoji||'') + '</span>' +
              '<span class="cluster-title">' + escHtml(c.titel||'') + '</span>' +
              '<span class="cluster-count">' + (c.items||[]).length + '</span>' +
            '</div>' +
            '<div class="cluster-summary">' + escHtml(c.zusammenfassung||'') + '</div>' +
          '</div>' +
          itemsHtml +
        '</div>';
    });
    container.innerHTML = html;
    container.querySelectorAll('[data-url]').forEach(function(el) {
      el.addEventListener('click', function() { if (el.dataset.url) window.open(el.dataset.url, '_blank'); });
    });
  } catch(err) {
    // Fallback: einfache Liste
    renderNewsList(news);
  }
}

function renderNewsList(news) {
  const container = document.getElementById('news-content');
  const wlSymbols = new Set(watchlist.map(function(a) { return a.symbol; }));
  const filtered = news.filter(function(item) { return !item.relatedSymbol || !wlSymbols.has(item.relatedSymbol); });
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><div class="ico">\ud83d\udcad</div><h3>Keine News</h3></div>';
    return;
  }
  const groups = {};
  filtered.forEach(function(item) {
    const label = fmtNewsDate(item.datetime);
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  });
  let out = '';
  for (const label in groups) {
    out += '<div class="group-header">' + label + '</div><div class="list-group">';
    groups[label].forEach(function(item) {
      var hl = (item.headline||'').replace(/ - Reuters$| - CNBC$| - Bloomberg$/,'').trim();
      var t = new Date(item.datetime).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      out += '<div class="news-item" data-url="'+(item.url||'')+'">' +
        '<div class="news-headline">'+escHtml(hl)+'</div>' +
        '<div class="news-meta"><span class="news-source">'+escHtml(item.source||'')+'</span><span> \u00b7 </span><span>'+t+' Uhr</span></div>' +
      '</div>';
    });
    out += '</div>';
  }
  container.innerHTML = out;
  container.querySelectorAll('[data-url]').forEach(function(el) {
    el.addEventListener('click', function() { if (el.dataset.url) window.open(el.dataset.url,'_blank'); });
  });
}

// ── KI-Analyse ────────────────────────────────
async function runAnalysis(a, forceRefresh = false) {
  const btn = document.getElementById('btn-analyze');
  if (!btn) return;
  btn.textContent = 'Analysiere…';
  btn.disabled = true;
  try {
    // Aktuelle News für dieses Asset holen
    let news = [];
    try {
      const nr = await fetch(`${API}/fetch-news?symbols=${a.symbol}&types=${a.type}`);
      if (nr.ok) news = await nr.json();
    } catch { /* News optional */ }
    const res = await fetch(`${API}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        symbol: a.symbol, type: a.type, name: a.name,
        price: a.price, changePercent: a.changePercent,
        news: news.filter(n => n.relatedSymbol === a.symbol),
        forceRefresh,
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    const analysis = await res.json();
    // Watchlist-Eintrag aktualisieren
    const idx = watchlist.findIndex(x => x.symbol === a.symbol);
    if (idx >= 0) {
      watchlist[idx].verdict = analysis.verdict;
      watchlist[idx].dcaScore = analysis.dcaScore;
      watchlist[idx].analysisAge = 'Gerade eben';
      watchlist[idx].analysis = analysis;
      await saveWatchlist(watchlist);
      renderWatchlist();
      renderDetail(watchlist[idx]);
    }
    showToast('✓ Analyse abgeschlossen');
  } catch(err) {
    console.error(err);
    showToast('Fehler bei der Analyse: ' + err.message.slice(0,40));
    if (btn) { btn.textContent = 'Jetzt analysieren'; btn.disabled = false; }
  }
}


// ── News-Vorschläge ──────────────────────────────
let suggestionsCache = null;

async function loadSuggestions(forceRefresh = false) {
  const container = document.getElementById('suggestions-content');
  if (!container) return;

  if (suggestionsCache && !forceRefresh) {
    renderSuggestions(suggestionsCache);
    return;
  }

  container.innerHTML = '<div class="list-group"><div class="sug-loading"><div class="spinner"></div><br>Claude analysiert Markt-News…</div></div>';

  try {
    const res = await fetch(`${API}/news-suggestions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        watchlistSymbols: watchlist.map(a => a.symbol),
        forceRefresh,
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    const suggestions = await res.json();
    suggestionsCache = suggestions;
    renderSuggestions(suggestions);
  } catch(err) {
    container.innerHTML = `<div class="list-group"><div class="sug-loading">Fehler: ${err.message.slice(0,60)}</div></div>`;
  }
}

function renderSuggestions(suggestions) {
  const container = document.getElementById('suggestions-content');
  if (!suggestions?.length) {
    container.innerHTML = '<div class="list-group"><div class="sug-loading">Keine Vorschläge verfügbar</div></div>';
    return;
  }
  const typeLabel = { stock:'Aktie', etf:'ETF', crypto:'Krypto' };
  container.innerHTML = `<div class="list-group">${suggestions.map(s => `
    <div class="suggestion-card">
      <div class="sug-header">
        <span class="sug-symbol">${escHtml(s.symbol)}</span>
        <span class="badge ${s.type === 'crypto' ? 'krypto' : s.type}" style="font-size:9px;">${typeLabel[s.type]||s.type}</span>
        <span class="sug-name">${escHtml(s.name)}</span>
      </div>
      <div class="sug-grund">${escHtml(s.grund)}</div>
      <div class="sug-news">📰 ${escHtml(s.newsAnker)}</div>
      <div class="sug-footer">
        ${s.risiko ? `<span class="sug-risiko">⚠ ${escHtml(s.risiko)}</span>` : ''}
        <button class="sug-add-btn" data-symbol="${s.symbol}" data-type="${s.type}" data-name="${escHtml(s.name)}">+ Watchlist</button>
      </div>
    </div>`).join('')}</div>`;

  // Add-Buttons
  container.querySelectorAll('.sug-add-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const symbol = btn.dataset.symbol;
      const type = btn.dataset.type;
      const name = btn.dataset.name;
      if (watchlist.find(a => a.symbol === symbol)) { showToast(`${symbol} bereits in der Watchlist`); return; }
      btn.textContent = '…';
      btn.disabled = true;
      const newAsset = { symbol, type, name, verdict: null, dcaScore: 0, price: null, changePercent: undefined };
      watchlist.push(newAsset);
      renderWatchlist();
      newsCache = null;
      try {
        const q = await fetchQuote(symbol, type);
        const idx = watchlist.findIndex(a => a.symbol === symbol);
        if (idx >= 0) { watchlist[idx] = { ...watchlist[idx], ...q }; renderWatchlist(); await saveWatchlist(watchlist); }
        btn.textContent = '✓ Hinzugefügt';
        showToast(`${symbol} zur Watchlist hinzugefügt`);
      } catch {
        showToast(`Kurs für ${symbol} nicht gefunden`);
        watchlist = watchlist.filter(a => a.symbol !== symbol);
        renderWatchlist();
        btn.textContent = '+ Watchlist';
        btn.disabled = false;
      }
    });
  });
}

document.getElementById('sug-refresh-btn')?.addEventListener('click', () => {
  suggestionsCache = null;
  loadSuggestions(true);
});

// ── Analyse rendern ──────────────────────────────
function renderAnalysis(an) {
  const signal = { positiv: '📈', neutral: '➡️', negativ: '📉' }[an.newsSignal] || '➡️';
  const pros = (an.pro||[]).map(p =>
    `<li>${escHtml(p.text)}${p.source ? `<span class="reason-source">[${escHtml(p.source)}]</span>` : ''}</li>`
  ).join('');
  const cons = (an.contra||[]).map(c =>
    `<li>${escHtml(c.text)}</li>`
  ).join('');
  const risks = (an.risiken||[]).map(r =>
    `<li>${escHtml(r.text)}${r.source ? `<span class="reason-source">[${escHtml(r.source)}]</span>` : ''}</li>`
  ).join('');

  return `
    <div class="list-group" style="padding:0;">
      <div class="reason-block">
        <div class="reason-title pro">
          <span class="ico">✓</span> Pro <span style="color:var(--text-secondary);font-weight:400">(${(an.pro||[]).length})</span>
        </div>
        <ul class="reason-list">${pros}</ul>
      </div>
      ${cons ? `<div class="reason-block">
        <div class="reason-title con">
          <span class="ico">!</span> Contra <span style="color:var(--text-secondary);font-weight:400">(${(an.contra||[]).length})</span>
        </div>
        <ul class="reason-list">${cons}</ul>
      </div>` : ''}
      ${risks ? `<div class="reason-block">
        <div class="reason-title flag">
          <span class="ico">⚠</span> Risiko-Flags <span style="color:var(--text-secondary);font-weight:400">(${(an.risiken||[]).length})</span>
        </div>
        <ul class="reason-list">${risks}</ul>
      </div>` : ''}
    </div>
    ${an.newsSignal ? `
    <div class="group-header">News-Signal</div>
    <div class="list-group">
      <div class="list-item" style="cursor:default;">
        <div style="font-size:15px;margin-bottom:6px;">${signal} <strong>${{ positiv:'Positiv', neutral:'Neutral', negativ:'Negativ' }[an.newsSignal]}</strong></div>
        <div style="font-size:14px;color:var(--text-secondary);">${escHtml(an.newsKommentar||'')}</div>
      </div>
    </div>` : ''}
    ${an.geaendertSeit ? `
    <div class="group-header">Geändert seit letzter Analyse</div>
    <div class="list-group">
      <div class="list-item" style="cursor:default;">
        <div style="font-size:14px;line-height:1.45;">${escHtml(an.geaendertSeit)}</div>
      </div>
    </div>` : ''}`;
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Detail rendern ────────────────────────────────
function renderDetail(a) {
  const cc = (a.changePercent||0) >= 0 ? 'pos' : 'neg';
  const v = a.verdict || 'neu';
  const vl = { akku:'Akkumulieren', halten:'Halten', beobachten:'Beobachten', risiko:'Risiko', neu:'Ausstehend' }[v];
  const dots = Array.from({length:5},(_,i) => '<span class="dot'+(i<(a.dcaScore||0)?' on':'')+'"></span>').join('');
  const typeLabel = { stock:'Aktie', etf:'ETF', crypto:'Krypto' }[a.type] || a.type;
  const analysisHtml = a.analysis ? renderAnalysis(a.analysis) : '<div class="list-group"><div class="list-item" style="cursor:default;"><div style="font-size:14px;color:var(--text-secondary);line-height:1.45;">Noch keine Analyse vorhanden. Tippe auf \"Jetzt analysieren\" um Claude zu beauftragen.</div></div></div>';

  document.getElementById('detail-content').innerHTML =
    '<div class="detail-hero">' +
      '<div class="detail-badges">' +
        '<span class="badge '+(a.type==='crypto'?'krypto':a.type)+'">'+typeLabel+'</span>' +
        (a.isin ? '<span class="badge isin">'+a.isin+'</span>' : '') +
      '</div>' +
      '<h1 class="large-title" style="padding:0;margin-bottom:2px;">'+a.symbol+'</h1>' +
      '<div class="detail-name">'+(a.name||a.symbol)+'</div>' +
      '<div class="detail-price-line">' +
        '<span class="detail-price">'+fmtPrice(a.price, a.currency)+'</span>' +
        '<span class="detail-change '+cc+'">'+fmtPct(a.changePercent)+' heute</span>' +
      '</div>' +
    '</div>' +
    '<div class="chart-card"><div id="chart-wrap" class="chart-wrap"><div class="chart-placeholder">Chart wird geladen…</div></div></div>' +
    '<div class="verdict-hero">' +
      '<div class="verdict-hero-label">Empfehlung für deinen Sparplan</div>' +
      '<div class="verdict-hero-row">' +
        '<span class="verdict-hero-value '+v+'">'+vl+'</span>' +
        '<span class="verdict-pill '+v+'">DCA-Score</span>' +
      '</div>' +
      '<div class="verdict-hero-meta">' +
        '<span class="dca-bar"><span style="font-weight:500;color:var(--text)">'+(a.dcaScore||0)+' / 5</span><span class="dots">'+dots+'</span></span>' +
        '<span>'+(a.analysisAge || 'Noch nicht analysiert')+'</span>' +
      '</div>' +
    '</div>' +
    '<div class="group-header">KI-Analyse</div>' +
    analysisHtml +
    '<div class="group-header">Aktuelle News</div>' +
    '<div id="detail-news-content"><div class="list-group"><div class="news-loading"><div class="spinner"></div><br>News werden geladen…</div></div></div>' +
    '<div class="detail-actions">' +
      '<button class="btn btn-secondary" id="btn-remove">Entfernen</button>' +
      '<button class="btn btn-primary" id="btn-analyze">Jetzt analysieren</button>' +
    '</div>';

  document.getElementById('btn-remove').addEventListener('click', () => {
    watchlist = watchlist.filter(x => x.symbol !== a.symbol);
    saveWatchlist(watchlist); renderWatchlist(); showView('watchlist');
  });
  document.getElementById('btn-analyze').addEventListener('click', () => runAnalysis(a));
  loadDetailChart(a);
  loadDetailNews(a);
}

async function loadDetailChart(a) {
  const wrap = document.getElementById('chart-wrap');
  if (!wrap) return;
  try {
    const res = await fetch(API+'/fetch-chart?symbol='+a.symbol+'&type='+a.type);
    const data = await res.json();
    const prices = (data.prices||[]).filter(p => p !== null);
    if (prices.length < 2) { wrap.innerHTML = '<div class="chart-placeholder">Keine Kursdaten</div>'; return; }
    const mn = Math.min(...prices), mx = Math.max(...prices), rng = mx-mn||1;
    const W=320, H=100, pad=4;
    const pts = prices.map((p,i) => {
      const x = (i/(prices.length-1))*W;
      const y = H-pad-((p-mn)/rng)*(H-pad*2);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    const isUp = prices[prices.length-1] >= prices[0];
    const col = isUp ? 'var(--green)' : 'var(--red)';
    wrap.innerHTML =
      '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">' +
        '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" style="stop-color:'+col+';stop-opacity:0.25"/>' +
          '<stop offset="100%" style="stop-color:'+col+';stop-opacity:0"/>' +
        '</linearGradient></defs>' +
        '<polygon points="0,'+H+' '+pts+' '+W+','+H+'" fill="url(#cg)"/>' +
        '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>' +
      '</svg>' +
      '<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text-tertiary);">' +
        '<span>'+fmtPrice(prices[0],a.currency)+'</span>' +
        '<span style="color:var(--text-secondary);font-size:10px;">30 Tage</span>' +
        '<span>'+fmtPrice(prices[prices.length-1],a.currency)+'</span>' +
      '</div>';
  } catch { wrap.innerHTML = '<div class="chart-placeholder">Chart nicht verfügbar</div>'; }
}


async function loadDetailNews(a) {
  const container = document.getElementById('detail-news-content');
  if (!container) return;
  try {
    const news = await fetchNews([a.symbol], [a.type]);
    const assetNews = news.filter(n => !n.relatedSymbol || n.relatedSymbol === a.symbol);
    if (!assetNews.length) {
      container.innerHTML = '<div class="list-group"><div class="list-item" style="cursor:default;"><div style="font-size:14px;color:var(--text-secondary);">Keine aktuellen News gefunden.</div></div></div>';
      return;
    }
    container.innerHTML = `<div class="list-group">${assetNews.slice(0,8).map(item => {
      const timeStr = new Date(item.datetime).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
      const dateStr = fmtNewsDate(item.datetime);
      return `<div class="news-item" data-url="${item.url||''}">
        <div class="news-headline">${escHtml(item.headline)}</div>
        <div class="news-meta">
          <span class="news-source">${escHtml(item.source)}</span>
          <span>·</span>
          <span>${dateStr !== 'Heute' ? dateStr + ', ' : ''}${timeStr} Uhr</span>
        </div>
      </div>`;
    }).join('')}</div>`;
    container.querySelectorAll('[data-url]').forEach(el => {
      el.addEventListener('click', () => { if (el.dataset.url) window.open(el.dataset.url, '_blank'); });
    });
  } catch {
    container.innerHTML = '<div class="list-group"><div class="list-item" style="cursor:default;"><div style="font-size:14px;color:var(--text-secondary);">Fehler beim Laden der News.</div></div></div>';
  }
}

// ── Asset hinzufügen ──────────────────────────────
// ── Symbol-Suche ──────────────────────────────────
let searchTimer = null;
let selectedAsset = null;

function clearSelection() {
  selectedAsset = null;
  document.getElementById('selected-asset-block').style.display = 'none';
  document.getElementById('input-search').value = '';
  document.getElementById('input-symbol').value = '';
  document.getElementById('input-type').value = 'stock';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('input-search').focus();
}

function selectAsset(result) {
  selectedAsset = result;
  document.getElementById('input-symbol').value = result.symbol;
  document.getElementById('input-type').value = result.type;
  document.getElementById('selected-symbol-display').textContent = result.symbol;
  document.getElementById('selected-name-display').textContent = result.name;
  document.getElementById('selected-asset-block').style.display = 'block';
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('input-search').value = '';
}

async function searchSymbol(q) {
  const container = document.getElementById('search-results');
  if (!q || q.length < 2) { container.classList.remove('open'); return; }
  container.innerHTML = '<div class="search-spinner">Suche…</div>';
  container.classList.add('open');
  try {
    const res = await fetch(`${API}/search-symbol?q=${encodeURIComponent(q)}`);
    const results = await res.json();
    if (!results.length) {
      container.innerHTML = '<div class="search-spinner">Keine Ergebnisse</div>';
      return;
    }
    const typeLabel = { stock:'Aktie', etf:'ETF', crypto:'Krypto' };
    container.innerHTML = results.map(r => `
      <div class="search-result-item" data-symbol="${r.symbol}" data-type="${r.type}" data-name="${r.name.replace(/"/g,'&quot;')}">
        <div class="sri-symbol">${r.symbol}</div>
        <div class="sri-info">
          <div class="sri-name">${r.name}</div>
          <div class="sri-type">${typeLabel[r.type]||r.type} · ${r.exchange}</div>
        </div>
      </div>`).join('');
    container.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => selectAsset({
        symbol: el.dataset.symbol,
        type: el.dataset.type,
        name: el.dataset.name,
      }));
    });
  } catch { container.innerHTML = '<div class="search-spinner">Fehler bei der Suche</div>'; }
}

document.getElementById('input-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => searchSymbol(e.target.value.trim()), 350);
});

document.getElementById('add-btn').addEventListener('click', () => {
  clearSelection();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('input-search').focus(), 100);
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('add-modal').classList.remove('open');
});
document.getElementById('modal-add').addEventListener('click', async () => {
  const symbol = document.getElementById('input-symbol').value.trim().toUpperCase();
  const type = document.getElementById('input-type').value;
  const note = document.getElementById('input-note').value.trim();
  if (!symbol) { showToast('Bitte ein Asset auswählen'); return; }
  if (watchlist.find(a => a.symbol === symbol)) { showToast(`${symbol} bereits in der Watchlist`); return; }
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('input-note').value = '';
  const assetName = selectedAsset?.name || symbol;
  const newAsset = { symbol, type, name: assetName, note, verdict: null, dcaScore: 0, price: null, changePercent: undefined };
  watchlist.push(newAsset);
  renderWatchlist();
  newsCache = null;
  try {
    const q = await fetchQuote(symbol, type);
    const idx = watchlist.findIndex(a => a.symbol === symbol);
    if (idx >= 0) { watchlist[idx] = { ...watchlist[idx], ...q }; renderWatchlist(); await saveWatchlist(watchlist); }
  } catch(err) {
    showToast(`Kurs für ${symbol} nicht gefunden`);
    watchlist = watchlist.filter(a => a.symbol !== symbol);
    renderWatchlist();
  }
});

// ── Init ──────────────────────────────────────────
(async () => {
  try {
    watchlist = await loadWatchlist();
    const updates = watchlist.map(async a => {
      try { return { ...a, ...await fetchQuote(a.symbol, a.type) }; }
      catch { return a; }
    });
    watchlist = await Promise.all(updates);
    renderWatchlist();
    await saveWatchlist(watchlist);
  } catch { renderWatchlist(); }
})();
</script>
